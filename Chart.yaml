apiVersion: v2
name: core-platform-distribution
description: |
  Eclipse Dataspace Hub (JAD) Core Platform Distribution — deploys the EDC connector
  components (control plane, data plane, identity hub, issuer service, siglet), the CFM
  agents and managers, and the security/gateway layer (jwtlet, clearglass, Traefik gateway).
  Postgres, Vault and NATS are deployed as in-chart manifests.
type: application
version: 0.1.0
appVersion: "latest"

# NOTE: this chart has no community sub-chart dependencies. All infrastructure is
# deployed as in-chart manifests under templates/:
#   - Postgres  -> templates/infra-glue/postgresql.yaml  (official postgres image)
#   - Vault     -> templates/infra-glue/vault.yaml        (hashicorp/vault, dev mode)
#   - NATS      -> templates/infra-glue/nats.yaml         (exact nats.conf preserved)
#   - Telemetry -> templates/telemetry/*.yaml             (jaeger/prometheus/loki/grafana)
# In-chart Service names are release-prefixed (<release>-postgresql / -vault / -nats) and
# the telemetry Services match the telemetry-config OTLP endpoints.
