name: Publish Helm Chart to GHCR

on:
  # publish on version tags, e.g. v0.1.0 / 0.1.0
  push:
    tags:
      - "v*.*.*"
      - "[0-9]+.[0-9]+.[0-9]+"
  # allow manual runs (packages the version currently in Chart.yaml)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint chart
        run: helm lint .

      - name: Render templates
        run: helm template . > /dev/null

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      # OCI repository must be lowercase; github.repository_owner may contain uppercase
      - name: Compute OCI repository
        id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "${REGISTRY}" \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Package chart
        id: package
        run: |
          # On tag pushes, override the chart version/appVersion with the tag
          # (strip a leading "v"); manual runs fall back to Chart.yaml.
          version_args=()
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
            version_args=(--version "${version}" --app-version "${version}")
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi
          helm package . --destination dist "${version_args[@]}"
          pkg=$(ls dist/*.tgz | head -n1)
          echo "path=${pkg}" >> "$GITHUB_OUTPUT"

      - name: Push chart to GHCR
        run: |
          helm push "${{ steps.package.outputs.path }}" \
            "oci://${REGISTRY}/${{ steps.repo.outputs.owner }}/charts"

      # only tag pushes carry a version to release; manual runs skip this
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.path }}
          generate_release_notes: true
          body: |
            Helm chart published to GHCR:

            ```
            helm pull oci://${{ env.REGISTRY }}/${{ steps.repo.outputs.owner }}/charts/core-platform-distribution --version ${{ steps.package.outputs.version }}
            ```
