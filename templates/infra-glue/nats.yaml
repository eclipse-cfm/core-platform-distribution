{{- if .Values.nats.enabled }}
{{- $name := include "cpd.fullname" (dict "name" "nats" "ctx" $) }}
{{- $configName := include "cpd.fullname" (dict "name" "nats-config" "ctx" $) }}
# Restored from the original raw kustomize manifest (k8s/base/infra/nats.yaml), replacing
# the community `nats` sub-chart: a single-replica in-chart NATS server with its exact
# nats.conf. The container runs with `-c /etc/nats/nats.conf` (differs from the image
# default), so the mounted config ConfigMap is required. Resource names are release-prefixed
# (<release>-nats) to match the community sub-chart naming convention; the nats.conf body,
# volume mappings and container args mirror the source 1:1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: {{ $name }}
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      name: {{ $name }}
      labels:
        app: {{ $name }}
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          imagePullPolicy: {{ .Values.nats.imagePullPolicy }}
          args:
            - "-c"
            - "/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              protocol: TCP
              name: client
            - containerPort: 8222
              protocol: TCP
              name: monitor
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
            - name: jetstream-storage
              mountPath: /tmp/jetstream
      volumes:
        - name: nats-config
          configMap:
            name: {{ $configName }}
        - name: jetstream-storage
          emptyDir: { }
      restartPolicy: Always

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configName }}
  namespace: {{ include "cpd.namespace" . }}
data:
  nats.conf: |
    # Basic server configuration
    port: 4222
    monitor_port: 8222

    # JetStream configuration
    jetstream {
        store_dir: "/tmp/jetstream"
        max_memory_store: 64MB
        max_file_store: 512MB
    }

    # Enable debug/trace
    debug: true
    trace: false

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
{{- end }}
