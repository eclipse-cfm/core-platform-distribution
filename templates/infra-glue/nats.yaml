{{- if .Values.nats.enabled }}
{{- $name := include "cpd.fullname" (dict "name" "nats" "ctx" $) }}
{{- $configName := include "cpd.fullname" (dict "name" "nats-config" "ctx" $) }}
{{- $authSecretName := include "cpd.fullname" (dict "name" "nats-auth" "ctx" $) }}
# Restored from the original raw kustomize manifest (k8s/base/infra/nats.yaml), replacing
# the community `nats` sub-chart: a single-replica in-chart NATS server with its exact
# nats.conf. The container runs with `-c /etc/nats/nats.conf` (differs from the image
# default), so the mounted config ConfigMap is required. Resource names are release-prefixed
# (<release>-nats) to match the community sub-chart naming convention; the nats.conf body,
# volume mappings and container args mirror the source 1:1, except for the authorization
# include appended when nats.auth.enabled (see docs/nats-authentication.md).
# NOTE: JetStream state is deliberately ephemeral (emptyDir): every pod restart wipes all
# streams, and only the nats-bootstrap job (install/upgrade) force-recreates the ones
# defined in values.yaml. Streams recreated ad hoc by reconnecting consumers may be
# scoped to their own subject filter -- run `helm upgrade` to restore the defined shape.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: {{ $name }}
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      name: {{ $name }}
      labels:
        app: {{ $name }}
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          imagePullPolicy: {{ .Values.nats.imagePullPolicy }}
          args:
            - "-c"
            - "/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              protocol: TCP
              name: client
            - containerPort: 8222
              protocol: TCP
              name: monitor
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
            - name: jetstream-storage
              mountPath: /tmp/jetstream
            {{- if .Values.nats.auth.enabled }}
            - name: nats-auth
              mountPath: /etc/nats/auth
              readOnly: true
            {{- end }}
      volumes:
        - name: nats-config
          configMap:
            name: {{ $configName }}
        - name: jetstream-storage
          emptyDir: { }
        {{- if .Values.nats.auth.enabled }}
        # Generated by the nats-auth-bootstrap job (public NKeys + permissions only).
        # The kubelet blocks container start until the Secret exists, which orders the
        # server after that job without Helm hooks. Changes to users.conf (e.g. a key
        # rotation) require a pod restart to take effect.
        - name: nats-auth
          secret:
            secretName: {{ $authSecretName }}
        {{- end }}
      restartPolicy: Always

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $configName }}
  namespace: {{ include "cpd.namespace" . }}
data:
  nats.conf: |
    # Basic server configuration
    port: 4222
    monitor_port: 8222

    # JetStream configuration
    jetstream {
        store_dir: "/tmp/jetstream"
        max_memory_store: 64MB
        max_file_store: 512MB
    }

    # Enable debug/trace
    debug: true
    trace: false
{{- if .Values.nats.auth.enabled }}

    # Component authentication (NKeys). users.conf (public keys + per-user
    # permissions) is generated by the nats-auth-bootstrap job into the
    # {{ $authSecretName }} Secret, mounted at /etc/nats/auth.
    # See docs/nats-authentication.md.
    include "auth/users.conf"
{{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
{{- end }}
