{{- if .Values.nats.enabled }}
# Restored verbatim from the original raw kustomize manifest (k8s/base/infra/nats.yaml),
# replacing the community `nats` sub-chart: a single-replica in-chart NATS server with its
# exact nats.conf. The container runs with `-c /etc/nats/nats.conf` (differs from the image
# default), so the mounted `nats-config` ConfigMap is required. Only the namespace and the
# server image/pull-policy are parameterized; everything else mirrors the source 1:1.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: nats
    platform: edcv
    type: edcv-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      name: nats
      labels:
        app: nats
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image }}
          imagePullPolicy: {{ .Values.nats.imagePullPolicy }}
          args:
            - "-c"
            - "/etc/nats/nats.conf"
          ports:
            - containerPort: 4222
              protocol: TCP
              name: client
            - containerPort: 8222
              protocol: TCP
              name: monitor
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
            - name: jetstream-storage
              mountPath: /tmp/jetstream
      volumes:
        - name: nats-config
          configMap:
            name: nats-config
        - name: jetstream-storage
          emptyDir: { }
      restartPolicy: Always

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: {{ include "cpd.namespace" . }}
data:
  nats.conf: |
    # Basic server configuration
    port: 4222
    monitor_port: 8222

    # JetStream configuration
    jetstream {
        store_dir: "/tmp/jetstream"
        max_memory_store: 64MB
        max_file_store: 512MB
    }

    # Enable debug/trace
    debug: true
    trace: false

---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: {{ include "cpd.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
{{- end }}
