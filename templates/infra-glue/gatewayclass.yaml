{{- if and .Values.security.gateway.enabled .Values.security.gatewayClass.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.global.gatewayClassName }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  controllerName: traefik.io/gateway-controller
{{- end }}
