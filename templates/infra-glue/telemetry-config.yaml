{{- if .Values.telemetry.configMapEnabled }}
{{- $t := .Values.telemetry.endpoints }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telemetry-config
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  # Pin the W3C propagators across every service (Java agent, Go SDK, Rust SDK) so a
  # runtime default change in any image can't silently drop traceparent at a boundary.
  OTEL_PROPAGATORS: {{ .Values.telemetry.propagators | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ printf "http://%s:%v" (include "cpd.fqdn" (dict "svc" (include "cpd.fullname" (dict "name" $t.tracesService "ctx" $)) "ctx" $)) $t.tracesPort | quote }}
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: {{ printf "http://%s:%v%s" (include "cpd.fqdn" (dict "svc" (include "cpd.fullname" (dict "name" $t.metricsService "ctx" $)) "ctx" $)) $t.metricsPort $t.metricsPath | quote }}
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: {{ printf "http://%s:%v%s" (include "cpd.fqdn" (dict "svc" (include "cpd.fullname" (dict "name" $t.logsService "ctx" $)) "ctx" $)) $t.logsPort $t.logsPath | quote }}
{{- end }}
