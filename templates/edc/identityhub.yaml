{{- if .Values.edc.identityhub.enabled }}
{{- $c := .Values.edc.identityhub }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityhub
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: identityhub
    type: edcv-app
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  replicas: {{ $c.replicas }}
  selector:
    matchLabels:
      app: identityhub
  template:
    metadata:
      labels:
        app: identityhub
        platform: edcv
        type: edcv-app
    spec:
      serviceAccountName: identityhub
      {{- if and .Values.nats.enabled .Values.nats.auth.enabled }}
      initContainers:
        {{- include "cpd.natsNkeyInitContainer" (dict "component" "identityhub" "ctx" $) | nindent 8 }}
      {{- end }}
      containers:
        - name: identityhub
          image: {{ include "cpd.image" (dict "img" $c.image "ctx" $) }}
          imagePullPolicy: {{ include "cpd.pullPolicy" (dict "policy" $c.imagePullPolicy "ctx" $) }}
          envFrom:
            {{- include "cpd.appEnvFrom" (dict "config" "ih-config" "ctx" $) | nindent 12 }}
          env:
            - name: OTEL_SERVICE_NAME
              value: edc.identityhub
          volumeMounts:
            # RFC 8693 subject token used to exchange for a participant-scoped token at jwtlet.
            {{- include "cpd.jwtletSubjectTokenMount" . | nindent 12 }}
            {{- if and .Values.nats.enabled .Values.nats.auth.enabled }}
            {{- include "cpd.natsNkeyMount" . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 7082
              name: creds-port
            - containerPort: 1044
              name: debug
            - containerPort: 7081
              name: identity-api
            - containerPort: 7083
              name: did
            - containerPort: 7080
              name: web

          livenessProbe:
            httpGet:
              path: /api/check/liveness
              port: 7080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          readinessProbe:
            httpGet:
              path: /api/check/readiness
              port: 7080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          startupProbe:
            httpGet:
              path: /api/check/startup
              port: 7080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          {{- with $c.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- include "cpd.jwtletSubjectTokenVolume" . | nindent 8 }}
        {{- if and .Values.nats.enabled .Values.nats.auth.enabled }}
        {{- include "cpd.natsNkeyVolume" . | nindent 8 }}
        {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: identityhub
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: identityhub
  ports:
    - port: 7082
      targetPort: 7082
      name: creds-port
    - port: 1044
      targetPort: 1044
      name: debug
    - port: 7081
      targetPort: 7081
      name: identity-api
    - port: 7083
      targetPort: 7083
      name: did
    - port: 7084
      targetPort: 7084
      name: sts

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: identityhub
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gatewayName }}
      kind: Gateway
      sectionName: http
  hostnames:
    - {{ .Values.global.host }}
  rules:
    # /ih/cs → identity API port 7081 (/ih/cs/** rewrites to /api/identity/**)
    - matches:
        - path:
            type: PathPrefix
            value: /api/identity
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/identity/v1beta
{{- if and .Values.global.authEnabled .Values.security.clearglass.enabled .Values.edc.identityhub.authEnabled }}
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: jwt-auth
{{- end }}
      backendRefs:
        - name: identityhub
          port: 7081
{{- end }}
