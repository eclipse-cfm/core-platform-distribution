{{- if .Values.edc.identityhub.enabled }}
{{- $c := .Values.edc.identityhub }}
{{- $jwtlet := printf "http://%s:8080" (include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $)) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ih-config
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  edc.hostname: {{ include "cpd.fqdn" (dict "svc" "identityhub" "ctx" $) | quote }}
  edc.iam.credentia.revocation.mimetype: "application/json"
  edc.iam.did.web.use.https: "false"
  edc.ih.iam.publickey.alias: "publickey-alias"
  web.http.port: "7080"
  web.http.path: "/api"
  web.http.identity.port: "7081"
  web.http.identity.path: "/api/identity"
  web.http.identity.auth.key: "password"
  web.http.credentials.port: "7082"
  web.http.credentials.path: "/api/credentials"
  web.http.did.port: "7083"
  web.http.did.path: "/"
  web.http.sts.port: "7084"
  web.http.sts.path: "/api/sts"
{{- if .Values.global.debug.enabled }}

  JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=1044"
{{- end }}

  edc.vault.hashicorp.url: {{ include "cpd.vaultUrl" . | quote }}
  # Default vault partition (IdentityHub's own secrets) uses the static root token.
  edc.vault.hashicorp.token: {{ .Values.vault.connection.rootToken | quote }}
  # Named, per-participant vault partitions authenticate via token exchange (jwtlet) -> Vault JWT auth.
  edc.vault.hashicorp.auth.tokenexchange.url: {{ $jwtlet | quote }}
  edc.vault.hashicorp.auth.tokenexchange.subjecttokenpath: "/var/run/secrets/jwtlet/token"
  edc.vault.hashicorp.auth.tokenexchange.audience: {{ .Values.global.tokenExchangeAudience | quote }}
  edc.vault.hashicorp.auth.tokenexchange.scope: "read"
  edc.vault.hashicorp.auth.jwt.role: "participant"

  edc.datasource.default.url: {{ printf "jdbc:postgresql://%s:%v/identityhub" (include "cpd.pgHost" .) .Values.postgresql.connection.port | quote }}
  edc.datasource.default.user: "ih"
  edc.datasource.default.password: "ih"
  edc.sql.schema.autocreate: "true"
  edc.iam.accesstoken.jti.validation: "true"
  # grace period for credential expiry, 3600*24 = 1 day
  edc.iam.credential.renewal.graceperiod: "86400"

  edc.encryption.aes.key.alias: "aes-key-alias"
  # Oauth2 config
  # EDC verifies inbound tokens against jwtlet (the token-exchange issuer); see edc.iam.oauth2.* below.
  edc.iam.oauth2.issuer: {{ $jwtlet | quote }}
  edc.iam.oauth2.jwks.url: {{ printf "%s/.well-known/jwks.json" $jwtlet | quote }}

  # NATS config for events
  edc.events.nats.url: {{ include "cpd.natsUrl" . | quote }}
  edc.events.nats.stream: "edc-events"
  edc.events.nats.stream.create: "false"
  edc.events.nats.stream.create.force: "false"
{{- if .Values.nats.auth.enabled }}
  # NKey seed delivered by the fetch-nats-nkey init container. Not interpreted by the
  # current runtime yet (it connects via the no_auth_user bridge until upstream NKey
  # support lands); see docs/nats-authentication.md.
  edc.nats.auth.nkey.seed.path: "/vault/secrets/nats.nk"
{{- end }}

{{- range $c.scopes }}
  edc.identityhub.scope.{{ .name }}.pattern: {{ .pattern | quote }}
  edc.identityhub.scope.{{ .name }}.leftoperand: {{ .leftOperand | quote }}
  edc.identityhub.scope.{{ .name }}.operator: {{ .operator | quote }}
  edc.identityhub.scope.{{ .name }}.rightOperand: {{ .rightOperand | quote }}
{{- end }}
{{- end }}
