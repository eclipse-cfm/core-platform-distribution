# Vault Agent configuration for Siglet
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config-siglet
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  vault-agent-config.hcl: |
    pid_file = "/tmp/vault-agent.pid"

    vault {
      address = "http://vault:8200"
    }

    auto_auth {
      method {
        type = "kubernetes"

        config = {
          role = "siglet-role"
        }
      }

      sink {
        type = "file"
        config = {
          path = "/vault/secrets/.vault-token"
          mode = 0644
        }
      }
    }
{{- end }}
