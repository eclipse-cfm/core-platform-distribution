{{- if .Values.edc.controlplane.enabled }}
{{- $c := .Values.edc.controlplane }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: controlplane
    type: edcv-app
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  replicas: {{ $c.replicas }}
  selector:
    matchLabels:
      app: controlplane
  template:
    metadata:
      name: controlplane
      labels:
        app: controlplane
        platform: edcv
        type: edcv-app
    spec:
      serviceAccountName: controlplane
      containers:
        - name: controlplane
          image: {{ include "cpd.image" (dict "img" $c.image "ctx" $) }}
          imagePullPolicy: {{ include "cpd.pullPolicy" (dict "policy" $c.imagePullPolicy "ctx" $) }}
          envFrom:
            {{- include "cpd.appEnvFrom" (dict "config" "controlplane-config" "ctx" $) | nindent 12 }}
          env:
            - name: OTEL_SERVICE_NAME
              value: edc.controlplane
          volumeMounts:
            # RFC 8693 subject token used to exchange for a participant-scoped token at jwtlet.
            # Audience must match jwtlet's `client_audience` (the Kubernetes cluster issuer).
            {{- include "cpd.jwtletSubjectTokenMount" . | nindent 12 }}
          ports:
            - containerPort: 8081
              name: management-port
            - containerPort: 8080
              name: default-port
            - containerPort: 1044
              name: debug-port
          livenessProbe:
            httpGet:
              path: /api/check/liveness
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          readinessProbe:
            httpGet:
              path: /api/check/readiness
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          startupProbe:
            httpGet:
              path: /api/check/startup
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
            timeoutSeconds: 120
          {{- with $c.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- include "cpd.jwtletSubjectTokenVolume" . | nindent 8 }}
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: controlplane
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: controlplane
  ports:
    - name: health
      port: 8080
      targetPort: 8080
    - name: management
      port: 8081
      targetPort: 8081
    - name: protocol
      port: 8082
      targetPort: 8082
    - name: debug
      port: 1044
      targetPort: 1044
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: controlplane
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gatewayName }}
      kind: Gateway
      sectionName: http
  hostnames:
    - {{ .Values.global.host }}
  rules:
    # /api/management → management API (port 8081, path /api/mgmt)
    - matches:
        - path:
            type: PathPrefix
            value: /api/management
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/mgmt
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: jwt-auth-management-api
      backendRefs:
        - name: controlplane
          port: 8081
          weight: 1
{{- end }}
