---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edcv-agent-config
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  # the file must be called "tm", and the extension must be one of
  # "json", "toml", "yaml", "yml", "properties", "props", "prop", "hcl", "tfvars", "dotenv", "env", "ini"
  edcvagent.env: |
    uri: {{ include "cpd.natsUrl" . }}
{{- if and .Values.nats.enabled .Values.nats.auth.enabled }}
    # NKey auth (common/natsclient); seed delivered by the fetch-nats-nkey init container
    nats.auth.method: nkey
    nats.auth.nkeySeedFile: /vault/secrets/nats.nk
{{- end }}
    bucket: cfm-bucket
    stream: cfm-stream
    httpport: 8080
    postgres: true
    dsn: postgres://cfm:cfm@{{ include "cpd.pgHost" . }}:{{ .Values.postgresql.connection.port }}/cfm?sslmode=disable
    vault.url: {{ include "cpd.vaultUrl" . }}
    identityhub.url: http://{{ include "cpd.fqdn" (dict "svc" "identityhub" "ctx" $) }}:7081/api/identity
    identityhub.sts.url: http://{{ include "cpd.fqdn" (dict "svc" "identityhub" "ctx" $) }}:7084/api/sts/token
    identityhub.cs.url: http://{{ include "cpd.fqdn" (dict "svc" "identityhub" "ctx" $) }}:7082/api/credentials/v1/participants/%s
    controlplane.url: http://{{ include "cpd.fqdn" (dict "svc" "controlplane" "ctx" $) }}:8081/api/mgmt
    controlplane.protocol.url: http://{{ include "cpd.fqdn" (dict "svc" "controlplane" "ctx" $) }}:8082/api/dsp/%s/http-dsp-profile-2025-1

    tokenexchange.url: http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080
    tokenexchange.audience: {{ .Values.global.tokenExchangeAudience }}
    tokenexchange.tokenFilePath: /var/run/secrets/jwtlet/token
