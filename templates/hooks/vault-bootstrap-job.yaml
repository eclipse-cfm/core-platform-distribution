{{- if and .Values.vault.enabled .Values.seedJobs.vaultBootstrap.enabled }}
{{- $jwtletHost := include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}
---
apiVersion: batch/v1
kind: Job
metadata:
  # Plain Job (NOT a Helm hook): it must run concurrently with the jwtlet/siglet
  # workloads whose vault-agent sidecars depend on the k8s-auth roles it creates.
  # As a post-install hook it would deadlock `helm install --wait`. The revision
  # suffix lets `helm upgrade` re-run it (Job specs are immutable).
  name: vault-bootstrap-r{{ .Release.Revision }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        type: edcv-job
    spec:
      serviceAccountName: vault-auth
      containers:
        - name: vault-cli
          image: {{ .Values.seedJobs.images.vault }}
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: VAULT_ADDR
              value: {{ include "cpd.vaultUrl" . | quote }}
            - name: VAULT_TOKEN
              value: {{ .Values.vault.connection.rootToken | quote }}
          command: [ "sh", "-ec" ]
          args:
            - |
              # Wait for vault to be ready
              echo "Waiting for Vault to be ready..."
              until vault status > /dev/null 2>&1; do
                echo "Vault not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "Vault is ready!"

              # Keycloak is no longer required for Vault auth: the JWT auth method below
              # trusts jwtlet (the token-exchange issuer) instead.


              # Enable JWT auth method
              vault auth enable jwt || true

              # NOTE: auth/jwt/config (which points Vault at jwtlet's JWKS) is written at the END of this
              # script, once jwtlet is up. jwtlet depends on Vault (its signing key, policy and Kubernetes
              # auth role are created further below), so configuring it here would create a chicken-and-egg
              # dependency between Vault bootstrap and jwtlet.

              # create mount for participants, each stores their secrets in a subdirectory
              # (idempotent: enabling an already-enabled path is not an error on re-run/upgrade)
              vault secrets enable -path=participants -version=2 kv 2>/dev/null \
                && echo "participants kv secrets engine enabled" \
                || echo "participants kv secrets engine already enabled"

              # get accessor for entity aliases
              ACCESSOR=$(vault auth list | grep 'jwt/' | awk '{print $3}')
              if [ -z "$ACCESSOR" ]; then
                echo "Failed to get JWT accessor"
                exit 1
              fi
              echo "Using JWT accessor: $ACCESSOR"


              # Allow full CRUD + list on the participant's own data path

              cat <<EOF | vault policy write participants-restricted - || { echo "Failed to write policy"; exit 1; }
              path "participants/data/{{ "{{" }}identity.entity.aliases.${ACCESSOR}.name{{ "}}" }}/*" {
                  capabilities = ["create", "read", "update", "delete", "list"]
              }

              path "participants/metadata/{{ "{{" }}identity.entity.aliases.${ACCESSOR}.name{{ "}}" }}/*" {
                   capabilities = ["read", "list", "delete"]
              }
              EOF

              # Allow participants access to transit keys prefixed with their context ID
              cat <<EOF | vault policy write participant-transit-policy - || { echo "Failed to write participant transit policy"; exit 1; }
              path "transit/keys/participant_{{ "{{" }}identity.entity.aliases.${ACCESSOR}.name{{ "}}" }}*" {
                  capabilities = ["read", "create", "update", "delete", "list"]
              }

              path "transit/sign/participant_{{ "{{" }}identity.entity.aliases.${ACCESSOR}.name{{ "}}" }}*" {
                  capabilities = ["create", "update"]
              }
              EOF

              vault write auth/jwt/role/participant -<<EOF || { echo "Failed to create JWT role"; exit 1; }
              {
                "role_type": "jwt",
                "user_claim": "sub",
                "bound_issuer": "http://{{ $jwtletHost }}:8080",
                "bound_audiences": ["{{ .Values.global.tokenExchangeAudience }}"],
                "token_policies": ["participants-restricted", "participant-transit-policy"],
                "clock_skew_leeway": 60
              }
              EOF


              vault write secret/data/aes-key-alias -<<EOF || { echo "Failed to create ase key entry"; exit 1; }
              {
                "data": {
                  "content": "yHo9w6m2KOI3FE7vI+fcN6j86JDQ6V10lJPlv9lLWoE="
                }
              }
              EOF

              # Enable Kubernetes auth method Siglet integration

              vault auth enable kubernetes 2>/dev/null || echo "Kubernetes auth already enabled"

              # Use the in-cluster API DNS name rather than the KUBERNETES_PORT_443_TCP_ADDR
              # link env var: that var is only injected for services in the pod's own
              # namespace, so it is empty for pods outside `default` and would yield an
              # invalid kubernetes_host (https://:443) -> every k8s-auth login 403s.
              #
              # No token_reviewer_jwt: on Kubernetes >=1.21 the bootstrap pod's mounted SA
              # token is a bound, short-lived token that Kubernetes invalidates once this
              # Job pod is deleted. Storing it here made every later TokenReview fail with
              # "service account token has been invalidated". With it omitted, Vault uses
              # its OWN pod's SA token (the Vault Deployment runs as vault-auth, bound to
              # the tokenreviews ClusterRole) to call TokenReview -- kubelet-rotated and
              # valid for the pod's lifetime, so it never goes stale.
              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc:443" \
                kubernetes_ca_cert="$(cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt)"

              # Enable Transit secrets engine for JWT signing
              vault secrets enable transit 2>/dev/null && echo "Transit engine enabled" || echo "Transit engine already enabled"

              # Create signing key for Siglet
              vault write -f transit/keys/signing-siglet type=ed25519 2>/dev/null && echo "Signing key created" || echo "Signing key already exists"

              # Create policy for signer
              cat <<EOF | vault policy write transit-policy - || { echo "Failed to write policy"; exit 1; }
              path "sys/health" {
                capabilities = ["read"]
              }

              # TODO revisit these permissions, we may want to scope them down further
              path "secret/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }

              # Allow access to Transit engine for JWT signing
              path "transit/sign/*" {
                capabilities = ["create", "update"]
              }

              path "transit/keys/*" {
                capabilities = ["read"]
              }

              path "transit/keys" {
                capabilities = ["list"]
              }

              EOF

              vault write auth/kubernetes/role/siglet-role \
                bound_service_account_names=siglet-sa \
                bound_service_account_namespaces={{ include "cpd.namespace" . }} \
                policies=transit-policy \
                ttl=1h


              echo "###############################"
              echo "Starting jwtlet vault bootstrap"
              echo "###############################"


              # Enable Kubernetes auth method
              echo "Enable Kubernetes auth method"
              vault auth enable kubernetes 2>/dev/null || true

              # Enable Transit secrets engine
              echo "Enable Transit secrets engine"
              vault secrets enable transit 2>/dev/null || true

              # write policy to allow jwtlet to read key metadata and sign with its transit key
              echo "write policy to allow jwtlet to read key metadata and sign with its transit key"
              cat <<EOF | vault policy write jwtlet-policy - || { echo "Failed to write jwtlet-policy"; exit 1; }
              path "transit/keys/signing-jwtlet_pc" {
                capabilities = ["read"]
              }
                path "transit/sign/signing-jwtlet_pc" {
                capabilities = ["update"]
              }
                path "sys/health" {
                capabilities = ["read"]
              }
              EOF

              # Kubernetes auth role for jwtlet's service account
              echo "Create Kubernetes auth role for jwtlet's service account"
              vault write auth/kubernetes/role/jwtlet-role \
                bound_service_account_names=jwtlet-sa \
                bound_service_account_namespaces={{ include "cpd.namespace" . }} \
                policies=jwtlet-policy \
                ttl=1h

              # Create Ed25519 signing key used by jwtlet (key name = "{prefix}-{participant_context_claim}")
              # With defaults: prefix="signing", claim="jwtlet_pc" -> key="signing-jwtlet_pc"
              echo "Create Ed25519 signing key used by jwtlet"
              vault write -f transit/keys/signing-jwtlet_pc type=ed25519 2>/dev/null || true

              # jwtlet's prerequisites (signing key, policy, Kubernetes auth role) now exist, so jwtlet can
              # start. Only now do we point Vault's JWT auth at jwtlet's JWKS. Doing it last avoids the
              # chicken-and-egg dependency (jwtlet needs Vault, so Vault must not require jwtlet earlier).
              echo "Waiting for jwtlet to be ready..."
              until wget -q --spider http://{{ $jwtletHost }}:8080/health > /dev/null 2>&1; do
                echo "jwtlet not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "jwtlet is ready!"

              vault write auth/jwt/config \
                jwks_url="http://{{ $jwtletHost }}:8080/.well-known/jwks.json" \
                default_role="participant" || { echo "Failed to configure JWT auth"; exit 1; }

              echo "Vault bootstrap completed successfully!"
      restartPolicy: OnFailure
{{- end }}
