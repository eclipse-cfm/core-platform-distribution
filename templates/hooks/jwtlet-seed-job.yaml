## This seed job creates a mapping entry for "system:serviceaccount:<namespace>:seed-jobs"
## and a scope mapping entry in JWTlet.

{{- if .Values.seedJobs.jwtletSeed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: jwtlet-seed
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: jwtlet-seed
    platform: edcv
    type: edcv-job
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: {{ .Values.seedJobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: jwtlet-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: seed-jobs
      restartPolicy: OnFailure

      initContainers:
        - name: wait-for-jwtlet
          image: {{ .Values.seedJobs.images.curl }}
          command:
            - sh
            - -c
            - |
              until curl -sf http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/health; do
                echo "Waiting for jwtlet to be ready..."
                sleep 5
              done
              echo ""
              echo "JWTlet is ready!"
      containers:
        - name: seed-jwtlet
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: JWTLET_MGMT_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8081/api/v1"

          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              # Read the projected service account token used to authenticate against the jwtlet management API.
              TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              echo "================================================"
              echo "Step 1: Create mapping entry for seed-jobs SA"
              echo "================================================"

              do_curl -X POST "${JWTLET_MGMT_URL}/mappings" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                    "clientIdentifier": "system:serviceaccount:{{ include "cpd.namespace" . }}:seed-jobs",
                    "participantContext": "issuer",
                    "scopes": ["read","write", "admin", "cfm-read", "cfm-write"],
                    "audiences": ["{{ .Values.global.tokenExchangeAudience }}"]
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "✓ mapping entry already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create mapping entry (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ mapping entries created"

              echo "================================================"
              echo "Step 2: Create mapping entry for Redline SA"
              echo "================================================"

              do_curl -X POST "${JWTLET_MGMT_URL}/mappings" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                    "clientIdentifier": "system:serviceaccount:{{ include "cpd.namespace" . }}:redline",
                    "participantContext": "redline",
                    "scopes": ["read","write", "cfm-read","cfm-write", "admin", "provision-manager-api:read", "provision-manager-api:write", "tenant-manager-api:read", "tenant-manager-api:write"],
                    "audiences": ["{{ .Values.global.tokenExchangeAudience }}"]
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "✓ mapping entry already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create mapping entry (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ mapping entries created"


              echo ""
              echo "================================================"
              echo "Step 2b: Create mapping entry for IssuerService SA"
              echo "================================================"

              do_curl -X POST "${JWTLET_MGMT_URL}/mappings" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                    "clientIdentifier": "system:serviceaccount:{{ include "cpd.namespace" . }}:issuerservice",
                    "participantContext": "issuer",
                    "scopes": ["read"],
                    "audiences": ["{{ .Values.global.tokenExchangeAudience }}"]
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "✓ mapping entry already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create mapping entry (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ mapping entries created"

              echo "================================================"
              echo "Step 3: Create scope mapping entries (batch)"
              echo "================================================"

              # The first block contains direct (1:1) mappings for every scope checked by the
              # platform APIs (IdentityHub identity-api/issuer-admin-api, Connector management-api,
              # CFM provision/tenant-manager APIs and Siglet management API), including the parent
              # ("<api>:<action>") and resource-wildcard ("<api>:*:<action>") forms of the EDC APIs.
              # CFM and Siglet scopes are matched verbatim, so no wildcard forms exist for them.
              # The last block contains the coarse-grained "role" scopes (read, write, admin, ...).
              do_curl -X POST "${JWTLET_MGMT_URL}/scopes" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d '[
                  {"scope": "identity-api:admin", "claims": {"scope": "identity-api:admin"}},
                  {"scope": "identity-api:read", "claims": {"scope": "identity-api:read"}},
                  {"scope": "identity-api:write", "claims": {"scope": "identity-api:write"}},
                  {"scope": "identity-api:*:read", "claims": {"scope": "identity-api:*:read"}},
                  {"scope": "identity-api:*:write", "claims": {"scope": "identity-api:*:write"}},
                  {"scope": "identity-api:participants:read", "claims": {"scope": "identity-api:participants:read"}},
                  {"scope": "identity-api:participants:write", "claims": {"scope": "identity-api:participants:write"}},
                  {"scope": "identity-api:dids:read", "claims": {"scope": "identity-api:dids:read"}},
                  {"scope": "identity-api:dids:write", "claims": {"scope": "identity-api:dids:write"}},
                  {"scope": "identity-api:keypairs:read", "claims": {"scope": "identity-api:keypairs:read"}},
                  {"scope": "identity-api:keypairs:write", "claims": {"scope": "identity-api:keypairs:write"}},
                  {"scope": "identity-api:credentials:read", "claims": {"scope": "identity-api:credentials:read"}},
                  {"scope": "identity-api:credentials:write", "claims": {"scope": "identity-api:credentials:write"}},
                  {"scope": "issuer-admin-api:admin", "claims": {"scope": "issuer-admin-api:admin"}},
                  {"scope": "issuer-admin-api:read", "claims": {"scope": "issuer-admin-api:read"}},
                  {"scope": "issuer-admin-api:write", "claims": {"scope": "issuer-admin-api:write"}},
                  {"scope": "issuer-admin-api:*:read", "claims": {"scope": "issuer-admin-api:*:read"}},
                  {"scope": "issuer-admin-api:*:write", "claims": {"scope": "issuer-admin-api:*:write"}},
                  {"scope": "issuer-admin-api:attestations:read", "claims": {"scope": "issuer-admin-api:attestations:read"}},
                  {"scope": "issuer-admin-api:attestations:write", "claims": {"scope": "issuer-admin-api:attestations:write"}},
                  {"scope": "issuer-admin-api:credentialdefinitions:read", "claims": {"scope": "issuer-admin-api:credentialdefinitions:read"}},
                  {"scope": "issuer-admin-api:credentialdefinitions:write", "claims": {"scope": "issuer-admin-api:credentialdefinitions:write"}},
                  {"scope": "issuer-admin-api:credentials:read", "claims": {"scope": "issuer-admin-api:credentials:read"}},
                  {"scope": "issuer-admin-api:credentials:write", "claims": {"scope": "issuer-admin-api:credentials:write"}},
                  {"scope": "issuer-admin-api:holders:read", "claims": {"scope": "issuer-admin-api:holders:read"}},
                  {"scope": "issuer-admin-api:holders:write", "claims": {"scope": "issuer-admin-api:holders:write"}},
                  {"scope": "issuer-admin-api:issuanceprocesses:read", "claims": {"scope": "issuer-admin-api:issuanceprocesses:read"}},
                  {"scope": "management-api:admin", "claims": {"scope": "management-api:admin"}},
                  {"scope": "management-api:read", "claims": {"scope": "management-api:read"}},
                  {"scope": "management-api:write", "claims": {"scope": "management-api:write"}},
                  {"scope": "management-api:*:read", "claims": {"scope": "management-api:*:read"}},
                  {"scope": "management-api:*:write", "claims": {"scope": "management-api:*:write"}},
                  {"scope": "management-api:agreements:read", "claims": {"scope": "management-api:agreements:read"}},
                  {"scope": "management-api:assets:read", "claims": {"scope": "management-api:assets:read"}},
                  {"scope": "management-api:assets:write", "claims": {"scope": "management-api:assets:write"}},
                  {"scope": "management-api:catalog:read", "claims": {"scope": "management-api:catalog:read"}},
                  {"scope": "management-api:contractdefinitions:read", "claims": {"scope": "management-api:contractdefinitions:read"}},
                  {"scope": "management-api:contractdefinitions:write", "claims": {"scope": "management-api:contractdefinitions:write"}},
                  {"scope": "management-api:dataplanes:write", "claims": {"scope": "management-api:dataplanes:write"}},
                  {"scope": "management-api:discovery:read", "claims": {"scope": "management-api:discovery:read"}},
                  {"scope": "management-api:negotiations:read", "claims": {"scope": "management-api:negotiations:read"}},
                  {"scope": "management-api:negotiations:write", "claims": {"scope": "management-api:negotiations:write"}},
                  {"scope": "management-api:policies:read", "claims": {"scope": "management-api:policies:read"}},
                  {"scope": "management-api:policies:write", "claims": {"scope": "management-api:policies:write"}},
                  {"scope": "management-api:profiles:read", "claims": {"scope": "management-api:profiles:read"}},
                  {"scope": "management-api:profiles:write", "claims": {"scope": "management-api:profiles:write"}},
                  {"scope": "management-api:transfers:read", "claims": {"scope": "management-api:transfers:read"}},
                  {"scope": "management-api:transfers:write", "claims": {"scope": "management-api:transfers:write"}},
                  {"scope": "provision-manager-api:read", "claims": {"scope": "provision-manager-api:read"}},
                  {"scope": "provision-manager-api:write", "claims": {"scope": "provision-manager-api:write"}},
                  {"scope": "tenant-manager-api:read", "claims": {"scope": "tenant-manager-api:read"}},
                  {"scope": "tenant-manager-api:write", "claims": {"scope": "tenant-manager-api:write"}},
                  {"scope": "siglet-mgmt-api:read", "claims": {"scope": "siglet-mgmt-api:read"}},
                  {"scope": "siglet-mgmt-api:write", "claims": {"scope": "siglet-mgmt-api:write"}},
                  {
                    "scope": "read",
                    "claims": {
                      "scope": "identity-api:read management-api:read issuer-admin-api:read siglet-api:read"
                    }
                  },
                  {
                    "scope": "write",
                    "claims": {
                      "scope": "identity-api:write management-api:write issuer-admin-api:write"
                    }
                  },
                  {
                    "scope": "cfm-write",
                    "claims": {
                      "scope": "provision-manager-api:write tenant-manager-api:write"
                    }
                  },
                  {
                    "scope": "cfm-read",
                    "claims": {
                      "scope": "provision-manager-api:read tenant-manager-api:read"
                    }
                  },
                  {
                    "scope": "siglet-write",
                    "claims": {
                      "scope": "siglet-mgmt-api:write"
                    }
                  },
                  {
                    "scope": "siglet-read",
                    "claims": {
                      "scope": "siglet-mgmt-api:read"
                    }
                  },
                  {
                    "scope": "admin",
                    "claims": {
                      "scope": "management-api:admin identity-api:admin issuer-admin-api:admin"
                    }
                  }
                ]'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "✓ scope mappings already exist"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create scope mappings (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              echo "✓ scope mappings created (54 direct mappings + roles: read, write, cfm-read, cfm-write, siglet-read, siglet-write, admin)"

              echo ""
              echo "================================================"
              echo "✓✓ JWTlet seeding completed!"
              echo "================================================"
      volumes:
        # RFC 8693 subject_token used to authenticate against the jwtlet
        # management API. Audience must match jwtlet's `client_audience`.
        - name: jwtlet-subject-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: https://kubernetes.default.svc.cluster.local
                  expirationSeconds: 3600
{{- end }}
