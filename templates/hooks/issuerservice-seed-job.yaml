## Generic (platform) seeding: creates the "issuer" tenant in the IssuerService.
## The dataspace-specific AttestationDefinitions and CredentialDefinitions live in a
## separate dataspace chart (see DataspaceProfile/), which runs after this.

{{- if .Values.seedJobs.issuerserviceSeed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: issuerservice-seed
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: issuerservice-seed
    platform: edcv
    type: edcv-job
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: {{ .Values.seedJobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: issuerservice-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: seed-jobs
      restartPolicy: OnFailure
      initContainers:
        # Wait for issuerservice to be ready
        - name: wait-for-issuerservice
          image: {{ .Values.seedJobs.images.curl }}
          command:
            - sh
            - -c
            - |
              until curl -sf http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10010/api/check/readiness; do
                echo "Waiting for issuerservice to be ready..."
                sleep 5
              done
              echo ""
              echo "IssuerService is ready!"
      containers:
        - name: seed-issuerservice
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: ISSUER_CLIENT_ID
              value: "issuer"
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              echo "================================================"
              echo "Step 1: Create Issuer Tenant in IssuerService"
              echo "================================================"

              # Exchange the projected SA token for an issuer-scoped token via jwtlet (RFC 8693).
              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              do_curl -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource=issuer" \
                --data-urlencode "scope=admin" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to exchange SA token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              EXCHANGED_TOKEN=$(printf '%s\n' "$RESP_BODY" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$EXCHANGED_TOKEN" ]; then
                echo "ERROR: Failed to parse exchanged token from response: $RESP_BODY"
                exit 1
              fi
              echo "✓ Admin-scoped token obtained"

              # Create issuer tenant
              do_curl -X POST "http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10015/api/identity/v1beta/participants" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "roles": ["admin"],
                  "serviceEndpoints": [
                    {
                      "type": "IssuerService",
                      "serviceEndpoint": "http://{{ include "cpd.fqdn" (dict "svc" "issuerservice" "ctx" $) }}:10012/api/issuance/v1beta/participants/issuer",
                      "id": "issuer-service-1"
                    }
                  ],
                  "active": true,
                  "participantContextId": "issuer",
                  "did": "{{ include "cpd.issuerDid" . }}",
                  "key": {
                    "keyId": "{{ include "cpd.issuerDid" . }}#key-1",
                    "privateKeyAlias": "key-1",
                    "keyGeneratorParams": {
                      "algorithm": "EdDSA"
                    }
                  },
                  "additionalProperties": {
                    "edc.vault.hashicorp.config": {
                      "config": {
                        "secretPath": "v1/participants",
                        "folderPath": "'"${ISSUER_CLIENT_ID}"'",
                        "vaultUrl": "{{ include "cpd.vaultUrl" $ }}"
                      }
                    }
                  }
                }'
              if [ "$RESP_STATUS" -eq 409 ]; then
                echo "⚠ Issuer tenant already exists"
              elif [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create issuer tenant (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              else
                echo "✓ Issuer tenant created"
              fi

              echo ""
              echo "================================================"
              echo "IssuerService (platform) seeding completed successfully!"
              echo "================================================"
      volumes:
        # RFC 8693 subject_token exchanged at jwtlet's /token endpoint for an
        # issuer-scoped token. Audience must match jwtlet's `client_audience`.
        - name: jwtlet-subject-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: https://kubernetes.default.svc.cluster.local
                  expirationSeconds: 3600
{{- end }}
