{{- if .Values.seedJobs.tenantManagerSeed.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: tenant-manager-seed
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: tenant-manager-seed
    platform: edcv
    type: edcv-job
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: {{ .Values.seedJobs.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: tenant-manager-seed
        platform: edcv
        type: edcv-job
    spec:
      serviceAccountName: seed-jobs
      restartPolicy: OnFailure
      initContainers:
        # Wait for tenant-manager to be ready
        - name: wait-for-tenant-manager
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              TOKEN=$(curl -sf -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource=issuer" \
                --data-urlencode "scope=cfm-read" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}" \
                | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              until curl -sf -H "Authorization: Bearer ${TOKEN}" http://{{ include "cpd.fqdn" (dict "svc" "tenant-manager" "ctx" $) }}:8080/api/v1alpha1/cells; do
                echo "Waiting for tenant-manager to be ready..."
                sleep 5
              done
              echo "Tenant Manager is ready!"
      containers:
        - name: seed-tenant-manager
          image: {{ .Values.seedJobs.images.curl }}
          env:
            - name: TM_BASE_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "tenant-manager" "ctx" $) }}:8080"
            - name: JWTLET_TOKEN_URL
              value: "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080/token"
          volumeMounts:
            - name: jwtlet-subject-token
              mountPath: /var/run/secrets/jwtlet
              readOnly: true
          command:
            - sh
            - -c
            - |
              set -e

              # Executes a curl request and stores the response body in RESP_BODY and status code in RESP_STATUS.
              do_curl() {
                RESP=$(curl -s -w "\n%{http_code}" "$@")
                RESP_STATUS=$(printf '%s\n' "$RESP" | tail -1)
                RESP_BODY=$(printf '%s\n' "$RESP" | sed '$d')
              }

              echo "================================================"
              echo "Step 1: Obtain Provisioner Token"
              echo "================================================"

              SA_TOKEN=$(cat /var/run/secrets/jwtlet/token)
              if [ -z "$SA_TOKEN" ]; then
                echo "ERROR: subject token at /var/run/secrets/jwtlet/token is empty"
                exit 1
              fi

              do_curl -X POST "${JWTLET_TOKEN_URL}" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
                --data-urlencode "subject_token=${SA_TOKEN}" \
                --data-urlencode "resource=issuer" \
                --data-urlencode "scope=cfm-write" \
                --data-urlencode "audience={{ .Values.global.tokenExchangeAudience }}"
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to exchange SA token (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi
              EXCHANGED_TOKEN=$(printf '%s\n' "$RESP_BODY" | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')
              if [ -z "$EXCHANGED_TOKEN" ]; then
                echo "ERROR: Failed to parse exchanged token from response: $RESP_BODY"
                exit 1
              fi
              echo "✓ Provisioner token obtained"

              echo ""
              echo "================================================"
              echo "Step 2: TenantManager Seeding"
              echo "================================================"

              # Create Cell
              echo "Creating Cell..."
              do_curl -X POST "$TM_BASE_URL/api/v1alpha1/cells" \
                -H "Authorization: Bearer ${EXCHANGED_TOKEN}" \
                -H "Content-Type: application/json" \
                -d '{
                  "properties": {
                    "newCellKey": "newCellValue"
                  },
                  "state": "active",
                  "stateTimestamp": "'"$(date -u +"%Y-%m-%dT%H:%M:%SZ")"'"
                }'
              if [ "$RESP_STATUS" -ge 400 ]; then
                echo "ERROR: Failed to create Cell (HTTP $RESP_STATUS): $RESP_BODY"
                exit 1
              fi

              CELL_ID=$(printf '%s\n' "$RESP_BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "✓ Cell created with ID: $CELL_ID"

              # NOTE: the Dataspace Profile (credential specs) and its deployment onto this
              # cell are dataspace-specific and are seeded by a separate dataspace chart
              # (see DataspaceProfile/), which discovers this cell via GET /cells.

              echo "================================================"
              echo "TenantManager (platform) seeding complete"
              echo "================================================"
      volumes:
        # RFC 8693 subject_token exchanged at jwtlet's /token endpoint for a
        # cfm-scoped token. Audience must match jwtlet's `client_audience`.
        - name: jwtlet-subject-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: https://kubernetes.default.svc.cluster.local
                  expirationSeconds: 3600
{{- end }}
