{{- if and .Values.nats.enabled .Values.nats.auth.enabled .Values.seedJobs.natsAuthBootstrap.enabled }}
{{- $secretName := include "cpd.fullname" (dict "name" "nats-auth" "ctx" $) }}
---
# The bootstrap job below applies the generated users.conf as a Secret through the
# API server, so it needs write access to exactly that Secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nats-auth-secret-writer
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
rules:
  # `create` cannot be scoped by resourceName (the name is unknown at admission),
  # hence the separate unrestricted create rule.
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "create" ]
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    resourceNames: [ {{ $secretName | quote }} ]
    verbs: [ "get", "update" ]
  # The job stamps the users.conf checksum onto the NATS Deployment's pod template so
  # a content change triggers a rolling restart (the server only reads its config at
  # startup; a mounted-Secret update alone is never picked up).
  - apiGroups: [ "apps" ]
    resources: [ "deployments" ]
    resourceNames: [ {{ include "cpd.fullname" (dict "name" "nats" "ctx" $) | quote }} ]
    verbs: [ "get", "patch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nats-auth-secret-writer
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nats-auth-secret-writer
subjects:
  - kind: ServiceAccount
    name: seed-jobs
    namespace: {{ include "cpd.namespace" . }}
---
apiVersion: batch/v1
kind: Job
metadata:
  # Plain Job (NOT a Helm hook), like the other infra bootstrap jobs: it must run
  # concurrently with `helm install --wait` because the NATS server pod blocks on
  # the Secret this job creates. The revision suffix lets `helm upgrade` re-run it
  # (Job specs are immutable). See docs/nats-authentication.md.
  name: nats-auth-bootstrap-r{{ .Release.Revision }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        type: edcv-job
    spec:
      serviceAccountName: seed-jobs
      containers:
        - name: nats-auth
          image: {{ .Values.seedJobs.images.natsBox }}
          env:
            - name: VAULT_ADDR
              value: {{ include "cpd.vaultUrl" . | quote }}
            - name: VAULT_TOKEN
              value: {{ .Values.vault.connection.rootToken | quote }}
            - name: SECRET_NAME
              value: {{ $secretName | quote }}
            - name: NATS_DEPLOYMENT
              value: {{ include "cpd.fullname" (dict "name" "nats" "ctx" $) | quote }}
            - name: ALLOW_LEGACY
              value: {{ .Values.nats.auth.allowLegacy | quote }}
          command: [ "sh", "-ec" ]
          args:
            - |
              echo "Waiting for Vault to be ready..."
              until curl -sf "$VAULT_ADDR/v1/sys/health" > /dev/null 2>&1; do
                echo "Vault not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "Vault is ready!"

              # Prints the PUBLIC key of the component's NKey user. The seed is
              # generated only if absent from Vault (so keys are stable across
              # upgrades) and otherwise never leaves Vault.
              get_or_create_seed() {
                comp=$1
                code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
                  -H "X-Vault-Token: $VAULT_TOKEN" \
                  "$VAULT_ADDR/v1/secret/data/nats/$comp")
                if [ "$code" = "200" ]; then
                  seed=$(grep -o '"seed":"[^"]*"' /tmp/resp.json | head -n1 | cut -d'"' -f4)
                  echo "Seed for '$comp' already in Vault, keeping it" >&2
                else
                  seed=$(nk -gen user)
                  curl -sf -o /dev/null -H "X-Vault-Token: $VAULT_TOKEN" \
                    -X POST -d "{\"data\":{\"seed\":\"$seed\"}}" \
                    "$VAULT_ADDR/v1/secret/data/nats/$comp"
                  echo "Generated and stored a new NKey for '$comp'" >&2
                fi
                printf '%s' "$seed" > /tmp/seed.tmp
                nk -inkey /tmp/seed.tmp -pubout
                rm -f /tmp/seed.tmp /tmp/resp.json
              }

              CP_PUB=$(get_or_create_seed controlplane);  [ -n "$CP_PUB" ]
              IH_PUB=$(get_or_create_seed identityhub);   [ -n "$IH_PUB" ]
              IS_PUB=$(get_or_create_seed issuerservice); [ -n "$IS_PUB" ]
              CFM_PUB=$(get_or_create_seed cfm-agents);   [ -n "$CFM_PUB" ]
              ADM_PUB=$(get_or_create_seed nats-admin);   [ -n "$ADM_PUB" ]

              # Assemble users.conf: public keys + permissions only (the permission
              # matrix is documented in docs/nats-authentication.md). Included by
              # nats.conf as `include "auth/users.conf"`.
              cat > /tmp/users.conf <<EOF
              # Generated by the nats-auth-bootstrap job -- DO NOT EDIT.
              # Seeds live in Vault under secret/nats/<component>.
              authorization {
                users [
                  # controlplane (SA: controlplane)
                  { nkey: "$CP_PUB", permissions: { publish: ["events.>", "\$JS.API.>", "\$JS.ACK.>"], subscribe: ["events.>", "_INBOX.>"] } }
                  # identityhub (SA: identityhub)
                  { nkey: "$IH_PUB", permissions: { publish: ["events.>", "\$JS.API.>"], subscribe: ["_INBOX.>"] } }
                  # issuerservice (SA: issuerservice)
                  { nkey: "$IS_PUB", permissions: { publish: ["events.>", "\$JS.API.>"], subscribe: ["_INBOX.>"] } }
                  # CFM agents and managers (SA: cfm-agents). cfm-stream carries "event.*"
                  # (natsclient CFMSubjectPrefix); "events.>" because kmagent consumes the
                  # edc-events stream.
                  { nkey: "$CFM_PUB", permissions: { publish: ["event.>", "\$KV.cfm-bucket.>", "\$JS.API.>", "\$JS.ACK.>"], subscribe: ["event.>", "events.>", "\$KV.cfm-bucket.>", "_INBOX.>"] } }
                  # nats-admin: stream bootstrap (SA: seed-jobs)
                  { nkey: "$ADM_PUB", permissions: { publish: [">"], subscribe: [">"] } }
              EOF
              if [ "$ALLOW_LEGACY" = "true" ]; then
                # Migration bridge: no_auth_user (nats.conf) maps credential-less
                # connections to this user. The password is random and discarded --
                # nothing is meant to log in as "legacy" explicitly.
                LEGACY_PW=$(head -c 24 /dev/urandom | base64 | tr -d '=+/\n')
                cat >> /tmp/users.conf <<EOF
                  # Migration bridge (nats.auth.allowLegacy), target of no_auth_user.
                  { user: legacy, password: "$LEGACY_PW", permissions: { publish: [">"], subscribe: [">"] } }
              EOF
              fi
              cat >> /tmp/users.conf <<EOF
                ]
              }
              EOF

              # Apply the Secret via the API server (nats-box has no kubectl).
              SA_DIR=/var/run/secrets/kubernetes.io/serviceaccount
              API="https://kubernetes.default.svc"
              NS=$(cat $SA_DIR/namespace)
              KTOKEN=$(cat $SA_DIR/token)
              B64=$(base64 < /tmp/users.conf | tr -d '\n')

              # Owner-reference the Secret to the (Helm-tracked) NATS Deployment: the
              # Secret itself is job-created and unknown to Helm, so without an owner it
              # would survive `helm uninstall` and a later reinstall's server would start
              # against the previous install's public keys. With the ownerReference, GC
              # removes it together with the Deployment.
              # ?pretty=false: the API server pretty-prints (spaces after colons) for
              # curl user agents, which would defeat naive JSON grepping. The grep stays
              # tolerant of both forms anyway.
              DEP_UID=$(curl -sf --cacert $SA_DIR/ca.crt -H "Authorization: Bearer $KTOKEN" \
                "$API/apis/apps/v1/namespaces/$NS/deployments/$NATS_DEPLOYMENT?pretty=false" \
                | grep -o '"uid": *"[^"]*"' | head -n1 | tr -d ' ' | cut -d'"' -f4)
              [ -n "$DEP_UID" ] || { echo "Failed to resolve UID of deployment $NATS_DEPLOYMENT"; exit 1; }
              OWNER="{\"apiVersion\":\"apps/v1\",\"kind\":\"Deployment\",\"name\":\"$NATS_DEPLOYMENT\",\"uid\":\"$DEP_UID\"}"
              BODY="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"$SECRET_NAME\",\"ownerReferences\":[$OWNER]},\"type\":\"Opaque\",\"data\":{\"users.conf\":\"$B64\"}}"

              code=$(curl -s -o /dev/null -w "%{http_code}" --cacert $SA_DIR/ca.crt \
                -H "Authorization: Bearer $KTOKEN" \
                "$API/api/v1/namespaces/$NS/secrets/$SECRET_NAME")
              if [ "$code" = "404" ]; then
                curl -sf -o /dev/null --cacert $SA_DIR/ca.crt \
                  -H "Authorization: Bearer $KTOKEN" \
                  -H "Content-Type: application/json" \
                  -X POST -d "$BODY" \
                  "$API/api/v1/namespaces/$NS/secrets"
                echo "Secret '$SECRET_NAME' created"
              else
                curl -sf -o /dev/null --cacert $SA_DIR/ca.crt \
                  -H "Authorization: Bearer $KTOKEN" \
                  -H "Content-Type: application/json" \
                  -X PUT -d "$BODY" \
                  "$API/api/v1/namespaces/$NS/secrets/$SECRET_NAME"
                echo "Secret '$SECRET_NAME' updated"
              fi

              # The NATS server only reads users.conf at startup, and the Secret is not
              # Helm-tracked (it survives `helm uninstall`), so the server may have
              # started with stale content. Stamp the content checksum onto the pod
              # template: unchanged content is a no-op, changed content triggers a
              # rolling restart that re-mounts the fresh Secret.
              CHECKSUM=$(sha256sum /tmp/users.conf | cut -d' ' -f1)
              curl -sf -o /dev/null --cacert $SA_DIR/ca.crt \
                -H "Authorization: Bearer $KTOKEN" \
                -H "Content-Type: application/strategic-merge-patch+json" \
                -X PATCH \
                -d "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"cpd.eclipse-cfm.org/nats-auth-checksum\":\"$CHECKSUM\"}}}}}" \
                "$API/apis/apps/v1/namespaces/$NS/deployments/$NATS_DEPLOYMENT"
              echo "NATS deployment stamped with users.conf checksum $CHECKSUM"
              rm -f /tmp/users.conf

              echo "NATS auth bootstrap completed successfully!"
      restartPolicy: OnFailure
{{- end }}
