{{- if and .Values.nats.enabled .Values.seedJobs.natsBootstrap.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nats-bootstrap
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        type: edcv-job
    spec:
      containers:
        - name: nats-cli
          image: {{ .Values.seedJobs.images.natsBox }}
          env:
            - name: NATS_URL
              value: {{ include "cpd.natsUrl" . | quote }}
          command: [ "sh", "-ec" ]
          args:
            - |
              echo "Waiting for NATS to be ready..."
              until curl -sf http://{{ include "cpd.natsHost" . }}:{{ .Values.nats.connection.monitorPort }}/healthz > /dev/null 2>&1; do
                echo "NATS not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "NATS is ready!"
              {{- range .Values.nats.streams }}

              nats stream add {{ .name }} \
                --server "$NATS_URL" \
                --subjects "{{ .subjects }}" \
                --storage {{ .storage }} \
                --retention {{ .retention }} \
                --allow-direct \
                --defaults 2>/dev/null \
              && echo "Stream '{{ .name }}' created" \
              || echo "Stream '{{ .name }}' already exists, skipping"
              {{- end }}

              echo "NATS bootstrap completed successfully!"
      restartPolicy: OnFailure
{{- end }}
