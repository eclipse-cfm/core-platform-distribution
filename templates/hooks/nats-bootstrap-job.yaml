{{- if and .Values.nats.enabled .Values.seedJobs.natsBootstrap.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  # Plain Job (NOT a Helm hook): runs concurrently with the workloads that publish
  # to / consume from the stream it creates. The revision suffix lets `helm upgrade`
  # re-run it (Job specs are immutable).
  name: nats-bootstrap-r{{ .Release.Revision }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        type: edcv-job
    spec:
      # seed-jobs is the SA bound to the nats-admin NKey seed (nats.auth); harmless
      # otherwise.
      serviceAccountName: seed-jobs
      {{- if .Values.nats.auth.enabled }}
      initContainers:
        {{- include "cpd.natsNkeyInitContainer" (dict "component" "nats-admin" "ctx" $) | nindent 8 }}
      {{- end }}
      containers:
        - name: nats-cli
          image: {{ .Values.seedJobs.images.natsBox }}
          env:
            - name: NATS_URL
              value: {{ include "cpd.natsUrl" . | quote }}
          {{- if .Values.nats.auth.enabled }}
          volumeMounts:
            {{- include "cpd.natsNkeyMount" . | nindent 12 }}
          {{- end }}
          command: [ "sh", "-ec" ]
          args:
            - |
              echo "Waiting for NATS to be ready..."
              until curl -sf http://{{ include "cpd.natsHost" . }}:{{ .Values.nats.connection.monitorPort }}/healthz > /dev/null 2>&1; do
                echo "NATS not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "NATS is ready!"

              AUTH="{{ if .Values.nats.auth.enabled }}--nkey /vault/secrets/nats.nk{{ end }}"
              {{- range .Values.nats.streams }}

              # Idempotent, non-destructive: create the stream only if it does not
              # already exist. Existing streams are left untouched so retained messages
              # survive re-runs (this job runs on every `helm upgrade`). Creation
              # failures are not swallowed: the job retries and eventually fails visibly.
              #
              # Caveat: a stream a consumer may have auto-created with only a partial
              # subject filter (common/natsclient creates missing streams) is NOT
              # repaired here -- it is treated as "already exists" and skipped.
              if nats stream info {{ .name }} --server "$NATS_URL" $AUTH > /dev/null 2>&1; then
                echo "Stream '{{ .name }}' already exists, skipping"
              else
                nats stream add {{ .name }} --server "$NATS_URL" $AUTH \
                  --subjects "{{ .subjects }}" \
                  --storage {{ .storage }} \
                  --retention {{ .retention }} \
                  --allow-direct \
                  --defaults
                echo "Stream '{{ .name }}' created"
              fi
              {{- end }}

              echo "NATS bootstrap completed successfully!"
      {{- if .Values.nats.auth.enabled }}
      volumes:
        {{- include "cpd.natsNkeyVolume" . | nindent 8 }}
      {{- end }}
      restartPolicy: OnFailure
{{- end }}
