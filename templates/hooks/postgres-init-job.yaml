{{- if .Values.postgresql.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-40"
    "helm.sh/hook-delete-policy": {{ .Values.seedJobs.hookDeletePolicy | quote }}
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        type: edcv-job
    spec:
      restartPolicy: OnFailure
      containers:
        - name: postgres-init
          image: {{ .Values.seedJobs.images.postgres }}
          env:
            - name: PGHOST
              value: {{ include "cpd.pgHost" . | quote }}
            - name: PGPORT
              value: {{ .Values.postgresql.connection.port | quote }}
            - name: PGUSER
              value: {{ .Values.postgresql.connection.adminUser | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cpd.pgAdminSecret" . }}
                  key: {{ .Values.postgresql.connection.adminPasswordSecret.key }}
          command: [ "sh", "-ec" ]
          args:
            - |
              echo "Waiting for Postgres at $PGHOST:$PGPORT ..."
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" > /dev/null 2>&1; do
                echo "Postgres not ready yet, retrying in 2 seconds..."
                sleep 2
              done
              echo "Postgres is ready!"
              {{- range .Values.postgresql.databases }}

              echo "Ensuring database '{{ .db }}' and user '{{ .user }}' exist..."
              psql -v ON_ERROR_STOP=1 --dbname "postgres" <<'EOSQL'
              SELECT 'CREATE DATABASE {{ .db }}'
                WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '{{ .db }}')\gexec
              DO $$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ .user }}') THEN
                  CREATE ROLE {{ .user }} LOGIN PASSWORD '{{ .password }}';
                END IF;
              END
              $$;
              GRANT ALL PRIVILEGES ON DATABASE {{ .db }} TO {{ .user }};
              EOSQL
              psql -v ON_ERROR_STOP=1 --dbname "{{ .db }}" <<'EOSQL'
              GRANT ALL ON SCHEMA public TO {{ .user }};
              EOSQL
              {{- end }}

              echo "Postgres bootstrap completed successfully!"
{{- end }}
