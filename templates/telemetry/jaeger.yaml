{{- if .Values.telemetry.jaeger.enabled }}
{{- $c := .Values.telemetry.jaeger }}
{{- $name := include "cpd.fullname" (dict "name" "jaeger" "ctx" $) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: {{ $name }}
    platform: edcv
    type: edcv-infra
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      name: {{ $name }}
      labels:
        app: {{ $name }}
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: jaeger
          image: {{ $c.image }}
          imagePullPolicy: {{ .Values.telemetry.imagePullPolicy }}
          ports:
            - containerPort: 16686
              protocol: TCP
              name: ui
            - containerPort: 4317
              protocol: TCP
              name: grpc
            - containerPort: 4318
              protocol: TCP
              name: http
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ $name }}
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: trace-http
      port: 4318
      targetPort: 4318
    - name: grpc
      port: 4317
      targetPort: 4317
{{- if .Values.security.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gatewayName }}
  hostnames:
    - {{ $c.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $name }}
          port: 16686
{{- end }}
{{- end }}
