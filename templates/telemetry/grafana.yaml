{{- if .Values.telemetry.grafana.enabled }}
{{- $c := .Values.telemetry.grafana }}
{{- $name := include "cpd.fullname" (dict "name" "grafana" "ctx" $) }}
{{- $datasourcesName := include "cpd.fullname" (dict "name" "grafana-datasources" "ctx" $) }}
{{- $dashboardsName := include "cpd.fullname" (dict "name" "grafana-dashboard-provisioning" "ctx" $) }}
{{- $prometheusHost := include "cpd.fqdn" (dict "svc" (include "cpd.fullname" (dict "name" "prometheus" "ctx" $)) "ctx" $) }}
{{- $jaegerHost := include "cpd.fqdn" (dict "svc" (include "cpd.fullname" (dict "name" "jaeger" "ctx" $)) "ctx" $) }}
{{- $lokiHost := include "cpd.fqdn" (dict "svc" (include "cpd.fullname" (dict "name" "loki" "ctx" $)) "ctx" $) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: {{ $name }}
    platform: edcv
    type: edcv-infra
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      name: {{ $name }}
      labels:
        app: {{ $name }}
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: grafana
          image: {{ $c.image }}
          imagePullPolicy: {{ .Values.telemetry.imagePullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-datasources
          configMap:
            name: {{ $datasourcesName }}
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $datasourcesName }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: {{ printf "http://%s:9090" $prometheusHost }}
        isDefault: true
        jsonData:
          timeInterval: 15s

      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: {{ printf "http://%s:16686" $jaegerHost }}
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1m"
            spanEndTimeShift: "1m"
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: prometheus

      - name: Loki
        type: loki
        uid: loki
        url: {{ printf "http://%s:3100" $lokiHost }}
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceId"\s*:\s*"(\w+)"'
              url: "$${__value.raw}"
              datasourceUid: jaeger
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $dashboardsName }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
{{- if .Values.security.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gatewayName }}
  hostnames:
    - {{ $c.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $name }}
          port: 3000
{{- end }}
{{- end }}
