{{- if .Values.telemetry.prometheus.enabled }}
{{- $c := .Values.telemetry.prometheus }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ include "cpd.namespace" . }}
  labels:
    app: prometheus
    platform: edcv
    type: edcv-infra
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      name: prometheus
      labels:
        app: prometheus
        platform: edcv
        type: edcv-infra
    spec:
      containers:
        - name: prometheus
          image: {{ $c.image }}
          imagePullPolicy: {{ .Values.telemetry.imagePullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-otlp-receiver
          ports:
            - containerPort: 9090
              protocol: TCP
              name: http
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
{{- if .Values.security.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gatewayName }}
  hostnames:
    - {{ $c.host }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus
          port: 9090
{{- end }}
{{- end }}
