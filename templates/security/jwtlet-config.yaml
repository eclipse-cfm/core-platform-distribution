apiVersion: v1
kind: ConfigMap
metadata:
  name: jwtlet-config
  namespace: {{ include "cpd.namespace" . }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
data:
  jwtlet.toml: |
    issuer = "http://{{ include "cpd.fqdn" (dict "svc" "jwtlet" "ctx" $) }}:8080"
    [storage_backend]
    type = "postgres"
    url  = "postgresql://jwtlet:jwtlet@postgres:5432/jwtlet"

    [k8s]
    api_server_url  = "https://kubernetes.default.svc"
    cluster_issuer  = "https://kubernetes.default.svc.cluster.local"

    [token]
    client_audience = "https://kubernetes.default.svc.cluster.local"
    audience        = "{{ .Values.global.tokenExchangeAudience }}"

    [vault]
    url        = "{{ include "cpd.vaultUrl" . }}"
    token_file = "/vault/secrets/.vault-token"

    [service_accounts]
    # only those three scopes exist for now, and the CFM needs all of them to create and confirm new mappings
    "system:serviceaccount:{{ include "cpd.namespace" . }}:cfm-agents" = ["jwtlet:management:mappings:write", "jwtlet:management:scope:write", "jwtlet:management:read"]
    "system:serviceaccount:{{ include "cpd.namespace" . }}:seed-jobs" = ["jwtlet:management:mappings:write", "jwtlet:management:scope:write", "jwtlet:management:read"]
{{- end }}
