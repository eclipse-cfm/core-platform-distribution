{{- if .Values.security.jwtlet.enabled }}
{{- $roleName := printf "vault-token-reviewer-%s" (include "cpd.namespace" .) }}
# ClusterRole allowing TokenReview API calls
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $roleName }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
---
# Vault's Kubernetes auth method calls TokenReview using Vault's own pod SA token
# (no static token_reviewer_jwt is configured), so the Vault Deployment runs as
# vault-auth and vault-auth is granted tokenreviews here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "vault-token-reviewer-binding-%s" (include "cpd.namespace" .) }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $roleName }}
subjects:
- kind: ServiceAccount
  name: vault-auth
  namespace: {{ include "cpd.namespace" . }}
---
# jwtlet needs TokenReview to verify incoming subject tokens (RFC 8693)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "jwtlet-token-reviewer-binding-%s" (include "cpd.namespace" .) }}
  labels:
    {{- include "cpd.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $roleName }}
subjects:
- kind: ServiceAccount
  name: jwtlet-sa
  namespace: {{ include "cpd.namespace" . }}
{{- end }}
