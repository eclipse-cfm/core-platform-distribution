{{- if .Values.security.clearglass.enabled }}
{{- $addr := printf "http://%s:8080/validate" (include "cpd.fqdn" (dict "svc" "clearglass" "ctx" $)) -}}
---
# Unified scope-less middleware: clearglass derives the scope requirements from
# its route map (X-Forwarded-Method/-Uri) instead of ?scope= params. All
# HTTPRoutes reference this middleware; the route map (enforced, default deny)
# is the single source of scope requirements, with implication (admin ⊇ write
# ⊇ read) applied.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-auth
  namespace: {{ include "cpd.namespace" $ }}
  labels:
    {{- include "cpd.labels" $ | nindent 4 }}
spec:
  forwardAuth:
    address: {{ $addr }}
    authRequestHeaders:
      - Authorization
    trustForwardHeader: true
{{- end }}
