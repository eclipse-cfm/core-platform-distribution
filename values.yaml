# Default registry prepended to first-party component images whose `repo` has no host.
# Kept OUTSIDE `global` (so it only ever applies to first-party images): the infra
# images (postgres, vault, nats) are pinned to their full upstream refs below.
imageRegistry: ghcr.io

# =============================================================================
# Global settings shared across every component.
# =============================================================================
global:
  # Target namespace. Also used as the DNS namespace segment in in-cluster FQDNs.
  # Leave `createNamespace: false` and use `helm install --namespace <ns> --create-namespace`.
  namespace: edc-v
  createNamespace: false

  # Default imagePullPolicy for the first-party components. Each component below can
  # override it with its own `imagePullPolicy` (e.g. set the locally-built images to
  # Never/IfNotPresent on KinD while the rest keep pulling Always).
  imagePullPolicy: Always
  clusterDomain: svc.cluster.local

  # HTTPRoute hostname all application routes are exposed under.
  host: jad.localhost
  gatewayName: edcv-gateway
  gatewayClassName: traefik

  # RFC 8693 subject-token wiring. The audience must match jwtlet's `client_audience`
  # (the Kubernetes cluster issuer).
  jwtSubjectTokenAudience: https://kubernetes.default.svc.cluster.local
  jwtSubjectTokenExpirationSeconds: 3600
  # jwtlet participant-token audience (client_audience / bound_audiences).
  tokenExchangeAudience: edcv

  # Master switch for the clearglass forward-auth middlewares on the API HTTPRoutes.
  # false => no route gets a jwt-auth middleware, regardless of the per-service
  # `authEnabled` flags. true => each service's own `authEnabled` decides.
  authEnabled: true

  # Emit JAVA_TOOL_OPTIONS with a JDWP agent (port 1044) for the JVM-based EDC apps.
  # Dev-only convenience — disable for production images.
  debug:
    enabled: true

# =============================================================================
# Infrastructure. Postgres, Vault and NATS are all in-chart manifests (see
# templates/infra-glue/), not community sub-charts. `connection.host: ""` means
# "derive <release>-<component>.<ns>.svc.<clusterDomain>" — the in-chart Services keep
# the <release>-postgresql / <release>-vault / <release>-nats names, so every consumer
# must resolve the host through the connection helpers, never a hardcoded name.
# =============================================================================
postgresql:
  enabled: true
  # Official postgres image (same family as the postgres-init hook). Pinned to a full
  # upstream ref so global.imageRegistry never rewrites it.
  image: postgres:17.7-alpine
  imagePullPolicy: IfNotPresent
  connection:
    host: ""
    port: 5432
    # Admin credentials used by the postgres-init hook to create the per-app DBs/users.
    adminUser: postgres
    # Secret (created by the in-chart postgresql template) holding the admin password.
    adminPasswordSecret:
      name: "" # "" => "<release>-postgresql"
      key: postgres-password
  # Bootstrap credentials for the in-chart server: the superuser password (stored in the
  # admin secret above) and the initial database created by the image on first start.
  auth:
    postgresPassword: postgres
    database: postgres
  # Data volume for the in-chart server. Dev default is an ephemeral emptyDir; enable
  # persistence (a PVC) for anything that must survive a pod restart.
  persistence:
    enabled: false
    size: 8Gi
    storageClass: "" # "" => cluster default StorageClass
  # Per-application databases/users created by the postgres-init hook.
  databases:
    - { db: controlplane, user: cp, password: cp }
    - { db: identityhub, user: ih, password: ih }
    - { db: issuerservice, user: issuer, password: issuer }
    # Consumed by the dataplane, which now ships in the jad-dataspace-profile chart;
    # postgres lives here so its database is still provisioned by this hook.
    - { db: dataplane, user: dp, password: dp }
    - { db: cfm, user: cfm, password: cfm }
    - { db: sigletdb, user: siglet, password: siglet }
    - { db: jwtlet, user: jwtlet, password: jwtlet }

vault:
  enabled: true
  # Official vault image, run in dev mode by the in-chart template. Pinned to a full
  # upstream ref so global.imageRegistry never rewrites it.
  image: hashicorp/vault:latest
  imagePullPolicy: IfNotPresent
  connection:
    host: ""
    port: 8200
    scheme: http
    rootToken: root # dev only; seeds the in-chart server's dev root token id

nats:
  enabled: true
  # NATS is deployed as an in-chart manifest (templates/infra-glue/nats.yaml) restored
  # verbatim from the original raw kustomize manifest, NOT as a community sub-chart. Its
  # jetstream tuning lives in the mounted nats.conf inside that template (store_dir,
  # max_memory_store 64MB, max_file_store 512MB, debug), matching the source exactly.
  image: nats:latest
  imagePullPolicy: IfNotPresent
  connection:
    # host "" => derive the in-chart service FQDN "nats.<ns>.svc.<clusterDomain>".
    host: ""
    port: 4222
    monitorPort: 8222
  # Component-level authentication via NKeys; see docs/nats-authentication.md.
  auth:
    # Renders the authorization include in nats.conf (users.conf is generated into
    # the <release>-nats-auth Secret by the nats-auth-bootstrap job), the per-pod
    # fetch-nats-nkey init containers, and the Vault policies/k8s-auth roles that
    # gate each component's seed to its service account.
    enabled: true
  # Streams created by the nats-bootstrap job.
  streams:
    - name: edc-events
      subjects: "events.>"
      storage: memory
      retention: interest

# =============================================================================
# Telemetry (observability stack). Deployed as in-chart templates (self-contained
# single-replica Deployments) named exactly as the telemetry-config endpoints below
# expect: jaeger / prometheus / loki / grafana. This keeps the OTLP wiring simple and
# matches the config; swap for the upstream community charts later if desired.
# =============================================================================
telemetry:
  # The telemetry-config ConfigMap is envFrom'd by nearly every app; keep it on even
  # if you disable the backends (exports will just no-op/fail softly).
  configMapEnabled: true
  imagePullPolicy: IfNotPresent
  # Endpoints baked into the telemetry-config ConfigMap. The service names are the
  # in-cluster Service names; hosts are rendered through cpd.fqdn at template time.
  endpoints:
    tracesService: jaeger
    tracesPort: 4318
    metricsService: prometheus
    metricsPort: 9090
    metricsPath: /api/v1/otlp/v1/metrics
    logsService: loki
    logsPort: 3100
    logsPath: /otlp/v1/logs
  propagators: "tracecontext,baggage"

  jaeger:
    enabled: true
    image: jaegertracing/all-in-one:1.62.0 # 1.62.0: latest has UI theming issues
    host: jaeger.localhost
  prometheus:
    enabled: true
    image: prom/prometheus:v3.2.1
    host: prometheus.localhost
  loki:
    enabled: true
    image: grafana/loki:3.4.2
    host: loki.localhost
  grafana:
    enabled: true
    image: grafana/grafana:11.6.1
    host: grafana.localhost

# =============================================================================
# Security & gateway.
# =============================================================================
security:
  gateway:
    enabled: true
  gatewayClass:
    # Cluster-scoped singleton keyed to the Traefik controller. Disable on clusters
    # that already provide the `traefik` GatewayClass.
    enabled: true
  clearglass:
    enabled: true
    image:
      repo: eclipse-cfm/clearglass
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
    # Static route→scope map evaluated by clearglass against X-Forwarded-Method /
    # X-Forwarded-Uri on every /validate call. Rules are first-match-wins, so keep
    # them most-specific-first; `anyOf` names the NARROWEST sufficient scope — wider
    # tokens (api-level, `<api>:*:<action>`, higher action) pass via implication
    # (admin ⊇ write ⊇ read). `*` = one segment, `**` (final only) = remainder.
    #
    # IMPORTANT: Traefik executes the forward-auth middleware AFTER the HTTPRoute
    # URLRewrite, so X-Forwarded-Uri carries the REWRITTEN backend path (verified
    # from report-only logs): /api/mgmt/v5beta/..., /api/identity/v1beta/...,
    # /api/admin/v1beta/..., /api/v1alpha1/... (tenant + provision manager share
    # this prefix and are disambiguated by resource name), and siglet paths with
    # the /api/siglet prefix stripped entirely (e.g. /tokens/...).
    routeMap:
      # false = report-only: violations are only logged ("report-only: ... would be
      # denied"), the legacy per-middleware ?scope= checks still decide. Flip to true
      # only after a clean soak (phase 3).
      enforce: true
      # applies when no rule matches: deny | allow
      default: deny
      # dataspace-profile-specific rules, evaluated BEFORE `rules` (first match wins)
      extraRules: []
      rules:
        # --- IdentityHub Identity API (backend /api/identity/v1beta/...) ---
        - path: /api/identity/*/participants/*/dids/**
          methods: [GET]
          anyOf: [identity-api:dids:read]
        - path: /api/identity/*/participants/*/dids/**
          methods: [POST, PUT, DELETE]
          anyOf: [identity-api:dids:write]
        - path: /api/identity/*/participants/*/keypairs/**
          methods: [GET]
          anyOf: [identity-api:keypairs:read]
        - path: /api/identity/*/participants/*/keypairs/**
          methods: [POST, PUT, DELETE]
          anyOf: [identity-api:keypairs:write]
        - path: /api/identity/*/participants/*/credentials/**
          methods: [GET]
          anyOf: [identity-api:credentials:read]
        - path: /api/identity/*/participants/*/credentials/**
          methods: [POST, PUT, DELETE]
          anyOf: [identity-api:credentials:write]
        - path: /api/identity/*/participants/**
          methods: [GET]
          anyOf: [identity-api:participants:read]
        - path: /api/identity/*/participants/**
          methods: [POST, PUT, DELETE]
          anyOf: [identity-api:participants:write]
        - path: /api/identity/*/dids/**
          methods: [GET, POST]
          anyOf: [identity-api:dids:read]
        # fallback for unmapped identity-api paths (narrow tokens will NOT pass here —
        # report-only logs reveal which paths need dedicated rules)
        - path: /api/identity/**
          methods: [GET]
          anyOf: [identity-api:read]
        - path: /api/identity/**
          anyOf: [identity-api:write]

        # --- Control plane Management API (backend /api/mgmt/v5beta/...) ---
        # participant context lifecycle & config are admin operations
        - path: /api/mgmt/*/participants
          methods: [POST]
          anyOf: [management-api:admin]
        - path: /api/mgmt/*/participants/*
          methods: [DELETE]
          anyOf: [management-api:admin]
        - path: /api/mgmt/*/participants/*/config
          methods: [PATCH, PUT]
          anyOf: [management-api:admin]
        # catalog is read-only (POST .../catalog/request and .../catalog/dataset/request are queries)
        - path: /api/mgmt/*/participants/*/catalog/**
          methods: [GET, POST]
          anyOf: [management-api:catalog:read]
        # EDC query convention: POST /<resource>/request is a READ
        - path: /api/mgmt/*/participants/*/assets/request
          methods: [POST]
          anyOf: [management-api:assets:read]
        - path: /api/mgmt/*/participants/*/assets/**
          methods: [GET]
          anyOf: [management-api:assets:read]
        - path: /api/mgmt/*/participants/*/assets/**
          methods: [POST, PUT, DELETE]
          anyOf: [management-api:assets:write]
        - path: /api/mgmt/*/participants/*/policydefinitions/request
          methods: [POST]
          anyOf: [management-api:policies:read]
        - path: /api/mgmt/*/participants/*/policydefinitions/**
          methods: [GET]
          anyOf: [management-api:policies:read]
        - path: /api/mgmt/*/participants/*/policydefinitions/**
          methods: [POST, PUT, DELETE]
          anyOf: [management-api:policies:write]
        - path: /api/mgmt/*/participants/*/contractdefinitions/request
          methods: [POST]
          anyOf: [management-api:contractdefinitions:read]
        - path: /api/mgmt/*/participants/*/contractdefinitions/**
          methods: [GET]
          anyOf: [management-api:contractdefinitions:read]
        - path: /api/mgmt/*/participants/*/contractdefinitions/**
          methods: [POST, PUT, DELETE]
          anyOf: [management-api:contractdefinitions:write]
        - path: /api/mgmt/*/participants/*/contractnegotiations/request
          methods: [POST]
          anyOf: [management-api:negotiations:read]
        - path: /api/mgmt/*/participants/*/contractnegotiations/**
          methods: [GET]
          anyOf: [management-api:negotiations:read]
        - path: /api/mgmt/*/participants/*/contractnegotiations/**
          methods: [POST]
          anyOf: [management-api:negotiations:write]
        - path: /api/mgmt/*/participants/*/contractagreements/**
          methods: [GET, POST]
          anyOf: [management-api:agreements:read]
        - path: /api/mgmt/*/participants/*/transferprocesses/request
          methods: [POST]
          anyOf: [management-api:transfers:read]
        - path: /api/mgmt/*/participants/*/transferprocesses/**
          methods: [GET]
          anyOf: [management-api:transfers:read]
        - path: /api/mgmt/*/participants/*/transferprocesses/**
          methods: [POST]
          anyOf: [management-api:transfers:write]
        - path: /api/mgmt/*/participants/*/dataplanes/**
          methods: [GET]
          anyOf: [management-api:read]
        - path: /api/mgmt/*/participants/*/dataplanes/**
          methods: [POST, PUT, DELETE]
          anyOf: [management-api:dataplanes:write]
        # fallback for unmapped management-api paths (celexpressions, discovery,
        # profiles, ... — refine from report-only logs)
        - path: /api/mgmt/**
          methods: [GET]
          anyOf: [management-api:read]
        - path: /api/mgmt/**
          anyOf: [management-api:write]

        # --- IssuerService Issuer Admin API (backend /api/admin/v1beta/...) ---
        - path: /api/admin/*/participants/*/holders/**
          methods: [GET]
          anyOf: [issuer-admin-api:holders:read]
        - path: /api/admin/*/participants/*/holders/**
          methods: [POST, PUT, DELETE]
          anyOf: [issuer-admin-api:holders:write]
        - path: /api/admin/*/participants/*/credentials/query
          methods: [POST]
          anyOf: [issuer-admin-api:credentials:read]
        - path: /api/admin/*/participants/*/credentials/**
          methods: [GET]
          anyOf: [issuer-admin-api:credentials:read]
        - path: /api/admin/*/participants/*/credentials/**
          methods: [POST, PUT, DELETE]
          anyOf: [issuer-admin-api:credentials:write]
        - path: /api/admin/*/participants/*/attestations/**
          methods: [GET]
          anyOf: [issuer-admin-api:attestations:read]
        - path: /api/admin/*/participants/*/attestations/**
          methods: [POST, PUT, DELETE]
          anyOf: [issuer-admin-api:attestations:write]
        - path: /api/admin/*/participants/*/credentialdefinitions/**
          methods: [GET]
          anyOf: [issuer-admin-api:credentialdefinitions:read]
        - path: /api/admin/*/participants/*/credentialdefinitions/**
          methods: [POST, PUT, DELETE]
          anyOf: [issuer-admin-api:credentialdefinitions:write]
        - path: /api/admin/*/participants/*/issuanceprocesses/**
          methods: [GET, POST]
          anyOf: [issuer-admin-api:issuanceprocesses:read]
        # fallback for unmapped issuer-admin-api paths
        - path: /api/admin/**
          methods: [GET]
          anyOf: [issuer-admin-api:read]
        - path: /api/admin/**
          anyOf: [issuer-admin-api:write]

        # --- CFM Tenant Manager + Provision Manager (both rewrite to /api/v1alpha1;
        # disambiguated by resource name; POST .../query endpoints are READs) ---
        # Tenant Manager: tenants, cells, dataspace-profiles, participant-profiles
        - path: /api/v1alpha1/tenants/query
          methods: [POST]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/tenants/*/participant-profiles/**
          methods: [GET]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/tenants/*/participant-profiles/**
          methods: [POST, PATCH, DELETE]
          anyOf: [tenant-manager-api:write]
        - path: /api/v1alpha1/tenants/**
          methods: [GET]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/tenants/**
          methods: [POST, PATCH, DELETE]
          anyOf: [tenant-manager-api:write]
        - path: /api/v1alpha1/cells/**
          methods: [GET]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/cells/**
          methods: [POST, PATCH, DELETE]
          anyOf: [tenant-manager-api:write]
        - path: /api/v1alpha1/dataspace-profiles/**
          methods: [GET]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/dataspace-profiles/**
          methods: [POST, PATCH, DELETE]
          anyOf: [tenant-manager-api:write]
        - path: /api/v1alpha1/participant-profiles/query
          methods: [POST]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/participant-profiles/**
          methods: [GET]
          anyOf: [tenant-manager-api:read]
        - path: /api/v1alpha1/participant-profiles/**
          methods: [POST, PATCH, DELETE]
          anyOf: [tenant-manager-api:write]
        # Provision Manager: activity-definitions, orchestration-definitions, orchestrations
        - path: /api/v1alpha1/orchestrations/query
          methods: [POST]
          anyOf: [provision-manager-api:read]
        - path: /api/v1alpha1/orchestrations/**
          methods: [GET]
          anyOf: [provision-manager-api:read]
        - path: /api/v1alpha1/orchestrations/**
          methods: [POST, DELETE]
          anyOf: [provision-manager-api:write]
        - path: /api/v1alpha1/activity-definitions/**
          methods: [GET]
          anyOf: [provision-manager-api:read]
        - path: /api/v1alpha1/activity-definitions/**
          methods: [POST, DELETE]
          anyOf: [provision-manager-api:write]
        - path: /api/v1alpha1/orchestration-definitions/**
          methods: [GET]
          anyOf: [provision-manager-api:read]
        - path: /api/v1alpha1/orchestration-definitions/**
          methods: [POST, DELETE]
          anyOf: [provision-manager-api:write]

        # --- Siglet (backend prefix stripped: /api/siglet/... -> /...; middleware
        # historically required siglet-api:read while enforcement and jwtlet seeding
        # use siglet-mgmt-api — accept both until the naming is unified) ---
        - path: /tokens/**
          methods: [GET]
          anyOf: [siglet-mgmt-api:read, siglet-api:read]
        - path: /key-mappings/**
          methods: [GET]
          anyOf: [siglet-mgmt-api:read, siglet-api:read]
        - path: /key-mappings/**
          methods: [POST, PUT, DELETE]
          anyOf: [siglet-mgmt-api:write, siglet-api:write]
  jwtlet:
    enabled: true
    image:
      repo: eclipse-cfm/jwtlet
      tag: latest
    vaultAgentImage: hashicorp/vault:latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
  # Traefik forward-auth middlewares. Each generates a Middleware named `jwt-auth-<name>`
  # whose forwardAuth address is clearglass /validate with one `scope=` query param per entry.
  middlewares:
    - name: management-api
      scopes: [management-api:read, management-api:write]
    - name: identity-api
      scopes: [identity-api:read, identity-api:write]
    - name: issuer-admin-api
      scopes: [issuer-admin-api:read, issuer-admin-api:write]
    - name: tenant-manager-api
      scopes: [tenant-manager-api:read, tenant-manager-api:write]
    - name: provision-manager-api
      scopes: [provision-manager-api:read, provision-manager-api:write]
    - name: siglet-api
      scopes: [siglet-api:read]

# =============================================================================
# EDC application components.
# =============================================================================
edc:
  controlplane:
    enabled: true
    # Attach the clearglass forward-auth middleware (jwt-auth-management-api) to this
    # service's HTTPRoute. Set false to expose the API without token validation. Auth is
    # also skipped chart-wide when global.authEnabled or security.clearglass.enabled
    # is false — global off wins over any per-service setting.
    authEnabled: true
    image:
      repo: eclipse-cfm/platform-images/controlplane
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
  identityhub:
    enabled: true
    # Clearglass forward-auth (jwt-auth-identity-api) on the HTTPRoute; see edc.controlplane.authEnabled.
    authEnabled: true
    configMapName: ih-config
    image:
      repo: eclipse-cfm/platform-images/identity-hub
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
    # Scope mappings rendered into the ih-config ConfigMap as
    # edc.identityhub.scope.<name>.{pattern,leftoperand,operator,rightoperand} keys.
    # Empty by default; override (typically in an extension) to add scopes, e.g.:
    #   scopes:
    #     - name: membership
    #       pattern: "org\.eclipse\.custom\.vc\.type:(.+):(read|\*|all)"
    #       leftOperand: "verifiableCredential.credential.type"
    #       operator: "contains"
    #       rightOperand: "$1"
    scopes: []
  issuerservice:
    enabled: true
    # Clearglass forward-auth (jwt-auth-issuer-admin-api) on the HTTPRoute; see edc.controlplane.authEnabled.
    authEnabled: true
    image:
      # there is a published issuerservice image in eclipse-cfm/platform-images, but it does NOT contain all the specific
      # code we need for our credentials here. Therefore, we build our own image in JAD
      repo: eclipse-cfm/platform-images/issuerservice
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
  siglet:
    enabled: true
    # Clearglass forward-auth (jwt-auth-siglet-api) on the HTTPRoute; see edc.controlplane.authEnabled.
    authEnabled: true
    image:
      repo: eclipse-dataplane-core/dsdk-facet-rs/siglet
      tag: latest
    vaultAgentImage: hashicorp/vault:latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
    # Transfer types written into siglet.toml as [[transfer_types]] blocks.
    # Override this list to change/add transfer profiles per deployment.
    transferTypes:
      - transferType: "https://w3id.org/dspace-sig/profile/http-pull"
        endpointType: "https://w3id.org/dspace-sig/profile/http-pull"
        endpoint: "http://provider:8080/data"
        tokenSource: "provider"
        txRenewalSupport: false

# =============================================================================
# CFM application components.
# =============================================================================
cfm:
  agents:
    # Single deployment, five containers each with their own config mounted at /etc/appname.
    enabled: true
    containers:
      jwtletAgent:
        image: { repo: eclipse-cfm/cfm/jwtletagent, tag: latest }
      edcvAgent:
        image: { repo: eclipse-cfm/cfm/edcvagent, tag: latest }
      ihAgent:
        image: { repo: eclipse-cfm/cfm/ihagent, tag: latest }
      registrationAgent:
        image: { repo: eclipse-cfm/cfm/regagent, tag: latest }
      onboardingAgent:
        image: { repo: eclipse-cfm/cfm/obagent, tag: latest }
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
  lifecycleAgents:
    # keymanagement agent
    enabled: true
    image:
      repo: eclipse-cfm/cfm/keymanagementagent
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
  provisionManager:
    enabled: true
    # Clearglass forward-auth (jwt-auth-provision-manager-api) on the HTTPRoute; see edc.controlplane.authEnabled.
    authEnabled: true
    configMapName: pm-config
    image:
      repo: eclipse-cfm/cfm/pmanager
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}
  tenantManager:
    enabled: true
    # Clearglass forward-auth (jwt-auth-tenant-manager-api) on the HTTPRoute; see edc.controlplane.authEnabled.
    authEnabled: true
    configMapName: tm-config
    image:
      repo: eclipse-cfm/cfm/tmanager
      tag: latest
    replicas: 1
    # imagePullPolicy overrides global.imagePullPolicy for this component (empty = use global)
    imagePullPolicy: ""
    resources: {}

# =============================================================================
# Seed jobs run as Helm post-install/post-upgrade hooks; the infra bootstrap jobs
# (postgres/nats/vault) are plain, release-owned Jobs (see templates/hooks/).
# =============================================================================
seedJobs:
  # Delete-policy for the seed-job HOOKS. Hook resources are NOT tracked by the
  # release, so without `hook-succeeded` they would linger after `helm uninstall`.
  #   before-hook-creation : remove a prior run before re-running (idempotent upgrades)
  #   hook-succeeded       : remove after a successful run (so nothing survives uninstall)
  # Failed hooks are intentionally kept (no `hook-failed`) so their logs can be inspected.
  hookDeletePolicy: before-hook-creation,hook-succeeded
  # Kubernetes-native garbage collection for the seed Jobs, independent of Helm's hook
  # lifecycle. Guarantees finished seed jobs are removed even when a helm install/upgrade
  # is interrupted or times out before it can run the hook-succeeded cleanup. Also long
  # enough (default 10m) to inspect a failed job's logs before the cluster reaps it.
  ttlSecondsAfterFinished: 600
  # Images used by the hook jobs.
  images:
    postgres: postgres:17.7-alpine
    natsBox: natsio/nats-box:latest
    vault: hashicorp/vault:latest
    curl: curlimages/curl:latest
  vaultBootstrap:
    enabled: true
  natsBootstrap:
    enabled: true
  # Generates the per-component NKey seeds (Vault) and the users.conf Secret
  # consumed by the NATS server; only effective when nats.auth.enabled.
  natsAuthBootstrap:
    enabled: true
  jwtletSeed:
    enabled: true
  issuerserviceSeed:
    enabled: true
  provisionManagerSeed:
    enabled: true
  tenantManagerSeed:
    enabled: true
